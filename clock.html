<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital World Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #282c34;
            color: white;
            font-family: "Arial", sans-serif;
        }
        .clock {
            text-align: center;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div class="clock">
        <h1>Digital World Clock</h1>
        <div id="time"></div>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const utc = now.toUTCString().split(' ')[4];
            document.getElementById('time').innerText = utc;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
